name: CoolMyMac
options:
  bundleIdPrefix: com.coolmymac
  xcodeVersion: "16.0"
  deploymentTarget:
    macOS: "15.0"
  defaultConfig: Debug
  createIntermediateGroups: true

packages:
  SMCKit:
    path: ../SMCKit

targets:

  # ─── Daemon ────────────────────────────────────────────────────────────────
  CoolMyMac-Daemon:
    type: tool
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - Daemon/Sources
    dependencies:
      - package: SMCKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coolmymac.app.daemon
        INFOPLIST_FILE: Daemon/Info.plist
        CODE_SIGN_ENTITLEMENTS: Daemon/CoolMyMacDaemon.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: "G24X82SAVJ"
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  # ─── App ───────────────────────────────────────────────────────────────────
  CoolMyMac:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - App/Sources
    resources:
      - App/Assets.xcassets
    dependencies:
      - package: SMCKit
      - target: CoolMyMac-Daemon
        embed: false   # Natively embedded via copyFiles phase below
    copyFiles:
      - destination: wrapper
        subpath: Contents/Library/LaunchDaemons
        files:
          - ${BUILT_PRODUCTS_DIR}/CoolMyMac-Daemon
          - Resources/com.coolmymac.app.daemon.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coolmymac.app
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/CoolMyMac.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: "G24X82SAVJ"
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

schemes:
  CoolMyMac:
    build:
      targets:
        CoolMyMac: all
        CoolMyMac-Daemon: all

  CoolMyMac-Daemon:
    build:
      targets:
        CoolMyMac-Daemon: all
